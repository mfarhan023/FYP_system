{% extends 'base.html' %}
{% block title %}EzVeriPhish — Phishing Detection Portal{% endblock %}

{% block content %}
<section class="hero">
    <h1 class="hero-title">
        EzVeriPhish <span class="gradient-text">Portal</span>
    </h1>


    <div class="form-card" id="formCard">
        <form action="{{ url_for('analyze') }}" method="POST" id="analyzeForm">
            <div class="textarea-wrapper">
                <textarea id="emailContent" name="email_content" class="email-input" placeholder="Paste here" rows="9"
                    maxlength="10000" required></textarea>

            </div>
            <div class="form-actions">
                <button type="submit" class="btn-analyze" id="analyzeBtn">
                    <span class="btn-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="currentColor"
                            viewBox="0 0 16 16" style="margin-right:7px;vertical-align:-2px;">
                            <path
                                d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                        </svg>
                        Verify Now
                    </span>
                    <span class="btn-loader" style="display:none;">
                        <span class="spinner"></span> Analyzing...
                    </span>
                </button>
                <button type="button" class="btn-clear" onclick="clearForm()">Clear</button>
            </div>
        </form>
    </div>
</section>


{% endblock %}

{% block scripts %}
<script>
    const SAMPLES = {
        safe: "Hi team,\n\nThe Q3 financial report is now ready for your review. Please access the document at https://docs.google.com/spreadsheets/d/abc123 and provide your feedback before Friday's meeting.\n\nBest regards,\nJohn from Finance",
        phishing: "Dear Valued Customer,\n\nWe have detected suspicious login activity on your account. Your account access has been limited.\n\nTo restore full access, please verify your identity immediately:\nhttp://secure-login-verification.com/account/update\n\nFailure to respond within 24 hours will result in permanent account termination.\n\nBank Security Department"
    };

    function setSample(type) {
        const ta = document.getElementById('emailContent');
        ta.value = SAMPLES[type];

        ta.scrollIntoView({ behavior: 'smooth', block: 'center' });
        ta.focus();
    }
    function clearForm() {
        document.getElementById('emailContent').value = '';

    }

</script>
{% endblock %}
