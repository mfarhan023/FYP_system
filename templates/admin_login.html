{% extends 'base.html' %}
{% block title %}Admin Login — EzVeriPhish{% endblock %}

{% block content %}
<section class="login-page">
    <div class="login-card">
        <div class="login-icon">🔐</div>
        <h1 class="login-title">Admin Access</h1>
        <p class="login-subtitle">This area is restricted to administrators only.</p>

        <form method="POST" action="{{ url_for('admin_login') }}" class="login-form">
            <div class="form-group">
                <label for="password" class="form-label">Admin Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="Enter admin password"
                    autocomplete="current-password"
                    required
                    autofocus
                />
            </div>
            {% if error %}
            <div class="login-error">
                ⚠️ {{ error }}
            </div>
            {% endif %}
            <button type="submit" class="btn-primary btn-full">
                🔓 Login as Admin
            </button>
        </form>

        <div class="login-back">
            <a href="{{ url_for('index') }}">← Back to Analyzer</a>
        </div>
    </div>
</section>
{% endblock %}
